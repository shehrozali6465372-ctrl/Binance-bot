```yaml
name: Binance Square Auto Poster

on:
  schedule:
    - cron: '0 */2 * * *' # Har 2 ghante baad khud chalega
  workflow_dispatch: # Isse aap manually bhi chala sakte hain

jobs:
  post_update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests

    - name: Run Crypto Agent
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        BINANCE_SQUARE_KEY: ${{ secrets.BINANCE_SQUARE_KEY }}
      run: python main.py
