name: Binance Square Auto Poster

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          echo "Node $(node --version), Python $(python --version)"

      - name: Run Crypto Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SQUARE_API_KEY: ${{ secrets.SQUARE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: "0"
          LIVE_MARKET_DATA: "1"
          POST_INTERVAL: "7200"
          MAX_ITERATIONS: "1"
          GEMINI_MODEL: "gemini-2.5-flash"
          DATABASE_PATH: "agent.db"
          PUBLISH_LOG_PATH: "published_posts.jsonl"
        run: python main.py

      - name: Upload logs and database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-output-${{ github.run_id }}
          path: |
            published_posts.jsonl
            agent.db
            posted_symbols.json
            charts/
