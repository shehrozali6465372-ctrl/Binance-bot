name: Binance Square Auto Poster

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    concurrency:
      group: binance-square-bot
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: Restore post history cache
        uses: actions/cache/restore@v4
        with:
          path: published_posts.jsonl
          key: post-history-${{ github.ref_name }}

      - name: Run Binance Square Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SQUARE_API_KEY: ${{ secrets.SQUARE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          DRY_RUN: "0"
          LIVE_MARKET_DATA: "1"

          # Single-run mode
          POST_INTERVAL: "0"
          MAX_ITERATIONS: "1"

          GEMINI_MODEL: "gemini-2.5-flash"

          # Safety
          MAX_DAILY_POSTS: "6"
          REPETITION_HARD_HOURS: "12"
          REPETITION_SOFT_HOURS: "24"

        run: python main.py

      - name: Save post history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: published_posts.jsonl
          key: post-history-${{ github.ref_name }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-output-${{ github.run_id }}
          path: |
            posts/
            research/
            prompts/
            drafts/
            images/
            agent.db
            published_posts.jsonl
